{% extends "base.html" %}
{% block title %}Recuperar contraseña{% endblock %}
{% block content %}
<h2>Recuperar contraseña</h2>
<form method="post">
    {% csrf_token %}
    {{ form.email.label_tag }}<br>
    {{ form.email }}<br><br>
    <button type="submit">Enviar enlace de recuperación</button>
</form>
{% endblock %}
